version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: panorama-backend-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: always
    networks:
      - panorama-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: panorama-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always
    networks:
      - panorama-network

networks:
  panorama-network:
    driver: bridge
