version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: panorama-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
    restart: unless-stopped
    networks:
      - panorama-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: panorama-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - panorama-network

networks:
  panorama-network:
    driver: bridge
